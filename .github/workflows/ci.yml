name: CI

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        platform: [x64]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore AiQuotaMonitor/AiQuotaMonitor.csproj -p:Platform=${{ matrix.platform }}

      - name: Build
        run: dotnet build AiQuotaMonitor/AiQuotaMonitor.csproj -c Release -p:Platform=${{ matrix.platform }} --no-restore

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-win-${{ matrix.platform }}
          path: AiQuotaMonitor/bin/${{ matrix.platform }}/Release
          retention-days: 7
