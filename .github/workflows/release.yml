name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true
        default: 'v0.0.0'

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        platform: [x64, arm64]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Windows App SDK workload
        run: |
          dotnet workload install maui-windows

      - name: Compute package metadata
        id: package
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($version)) { $version = "${{ github.ref_name }}" }
          if ([string]::IsNullOrWhiteSpace($version)) { $version = "v0.0.0" }
          if (-not $version.StartsWith("v")) { $version = "v$version" }

          $cleanVersion = $version.TrimStart("v")
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          $packageName = "AiQuotaMonitor-$version-$shortSha-win-${{ matrix.platform }}-portable"

          "version=$version" >> $env:GITHUB_OUTPUT
          "clean_version=$cleanVersion" >> $env:GITHUB_OUTPUT
          "short_sha=$shortSha" >> $env:GITHUB_OUTPUT
          "package_name=$packageName" >> $env:GITHUB_OUTPUT

      - name: Publish (${{ matrix.platform }})
        run: |
          dotnet publish AiQuotaMonitor/AiQuotaMonitor.csproj `
            -c Release `
            -p:Platform=${{ matrix.platform }} `
            -r win-${{ matrix.platform }} `
            --self-contained true `
            -p:PublishSingleFile=false `
            -p:WindowsPackageType=None `
            -p:Version=${{ steps.package.outputs.clean_version }} `
            -p:SourceRevisionId=${{ github.sha }} `
            -o publish/${{ matrix.platform }}

      - name: Zip artifact
        run: |
          Compress-Archive -Path publish/${{ matrix.platform }}/* -DestinationPath "${{ steps.package.outputs.package_name }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.package_name }}
          path: ${{ steps.package.outputs.package_name }}.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.package_name }}.zip
          draft: true
          generate_release_notes: true
          body: |
            ## AI Quota Monitor ${{ github.ref_name }}

            - Commit: `${{ steps.package.outputs.short_sha }}`
            - 配置模式：便携版，配置与日志保存在程序目录 `data/`

            ### 下载
            - **x64**: `AiQuotaMonitor-${{ github.ref_name }}-${{ steps.package.outputs.short_sha }}-win-x64-portable.zip`
            - **ARM64**: `AiQuotaMonitor-${{ github.ref_name }}-${{ steps.package.outputs.short_sha }}-win-arm64-portable.zip`

            ### 使用
            1. 下载对应架构的 zip 并解压
            2. 运行 `AiQuotaMonitor.exe`
            3. 首次启动添加账号（GLM / Kimi / MiMo / MiniMax / Factory / GPT / Claude / OpenRouter / DeepSeek / Moonshot / ElevenLabs）

            ### 系统要求
            - Windows 10 19041+ / Windows 11
            - WebView2 Runtime（Windows 11 内置）
